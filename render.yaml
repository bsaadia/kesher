databases:
  - name: tzahal-postgres
    databaseName: tzahal_mapper
    user: tzahal
    region: frankfurt
    postgresMajorVersion: "16"   # matches local docker-compose's postgis/postgis:16-3.4; 13+ required for self-service PostGIS
    # plan: left unspecified — choose/confirm in the Render dashboard during Blueprint creation (avoid the free tier, it expires after 30 days)

services:
  - name: tzahal-web
    type: web
    runtime: python
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "gunicorn -c gunicorn.conf.py wsgi:app"
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tzahal-postgres
          property: connectionString
      - key: SECRET_KEY
        sync: false
